services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: localdevpassword
      POSTGRES_DB: repo_ops_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:localdevpassword@db:5432/repo_ops_agent
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
